<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI İlan Platformu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .ilan-fiyat { color: #198754; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">🚀 Otonom İlan Analiz Platformu</h2>
    
    <div class="row" id="ilan-konteyneri">
        <div class="col-12 text-center text-muted" id="yukleniyor-mesaji">
            Veritabanından ilanlar çekiliyor...
        </div>
    </div>
</div>

<script>
    // Sayfa açıldığında API'den verileri çeken fonksiyon
    async function ilanlariGetir() {
        try {
            // Arka plandaki motorumuza (FastAPI) istek atıyoruz
            const response = await fetch('http://localhost:8000/ilanlar/');
            const data = await response.json();
            
            const konteyner = document.getElementById('ilan-konteyneri');
            konteyner.innerHTML = ''; // Yükleniyor yazısını temizle

            if (data.ilanlar.length === 0) {
                konteyner.innerHTML = '<div class="alert alert-warning text-center">Veritabanında hiç ilan bulunamadı.</div>';
                return;
            }

            // Gelen her bir ilan için ekranda şık bir "Kart" oluşturuyoruz
            data.ilanlar.forEach(ilan => {
                // Fiyatı daha okunaklı formatlıyoruz
                const formatliFiyat = new Intl.NumberFormat('tr-TR').format(ilan.fiyat || 0);
                
                // Eğer orijinal metin boşsa hata vermemesi için önlem
                const metinKisa = ilan.orijinal_metin ? ilan.orijinal_metin.substring(0, 100) + "..." : "Detay bulunmuyor.";
                const ilanBaslik = ilan.baslik ? ilan.baslik : "Başlık Bulunamadı";
                
                const kartHTML = `
                    <div class="col-md-4 mb-4">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title">${ilanBaslik}</h5>
                                <p class="ilan-fiyat">${formatliFiyat} ₺</p>
                                <span class="badge bg-secondary mb-2">${ilan.ilan_tipi || 'Bilinmiyor'}</span>
                                <p class="card-text text-muted small">${metinKisa}</p>
                                <a href="${ilan.link}" target="_blank" class="btn btn-primary btn-sm w-100">İlana Git</a>
                            </div>
                            <div class="card-footer text-muted" style="font-size: 0.8rem;">
                                ID: ${ilan.id} | Kayıt: ${new Date(ilan.olusturulma_tarihi).toLocaleDateString('tr-TR')}
                            </div>
                        </div>
                    </div>
                `;
                konteyner.innerHTML += kartHTML;
            });
            
        } catch (error) {
            console.error("Veri çekilirken hata oluştu:", error);
            document.getElementById('ilan-konteyneri').innerHTML = 
                '<div class="alert alert-danger">API ile bağlantı kurulamadı. Sunucunun açık olduğundan emin olun. (Konsola F12 basarak bakın)</div>';
        }
    }

    // Fonksiyonu çalıştır
    ilanlariGetir();
</script>

</body>
</html>
